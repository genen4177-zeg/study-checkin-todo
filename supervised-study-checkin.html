<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>监督学习打卡与待办事项</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #edf8ff;
      --bg-soft: #f7fbff;
      --card: rgba(255, 255, 255, 0.86);
      --primary: #1f8fff;
      --primary-dark: #0871d8;
      --primary-soft: #e0f1ff;
      --text: #12314f;
      --muted: #6d8093;
      --line: #d9e8f6;
      --danger: #ef5261;
      --danger-soft: #ffe8eb;
      --shadow: 0 18px 45px rgba(42, 118, 181, 0.16);
      --radius: 22px;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background-color: #f9fcff;
      background-image: url("cute-background.jpg");
      background-position: center top;
      background-size: cover;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      background: rgba(255, 255, 255, 0.12);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.54;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 44px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--primary-dark);
      font-size: 14px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 680px;
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .clock {
      min-width: 245px;
      padding: 18px 20px;
      border: 1px solid rgba(31, 143, 255, 0.18);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .clock-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .clock-time {
      color: var(--primary-dark);
      font-size: 20px;
      font-weight: 900;
      white-space: nowrap;
    }

    .panel {
      border: 1px solid rgba(31, 143, 255, 0.16);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .panel + .todo-board {
      margin-top: 22px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 22px 22px 0;
    }

    .panel-title {
      margin: 0;
      font-size: 22px;
    }

    .title-with-icon {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .title-icon {
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      border: 2px solid rgba(31, 143, 255, 0.16);
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 8px 16px rgba(72, 130, 174, 0.13);
      object-fit: cover;
    }

    .panel-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .checkin-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 22px;
    }

    .checkin-card {
      position: relative;
      min-width: 0;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(247, 251, 255, 0.9) 100%);
      box-shadow: 0 10px 26px rgba(72, 130, 174, 0.1);
      cursor: pointer;
    }

    .checkin-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .checkin-name {
      margin: 0;
      font-size: 22px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #edf6ff;
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status.running {
      background: #e8f9ef;
      color: #128348;
    }

    .timer {
      margin: 0 0 18px;
      color: #0b6fca;
      font-size: clamp(34px, 6vw, 48px);
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .time-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 14px;
      background: rgba(224, 241, 255, 0.74);
      color: var(--muted);
      font-size: 14px;
    }

    .time-row strong {
      color: var(--text);
      font-weight: 800;
      text-align: right;
    }

    .primary-button,
    .add-button {
      min-height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), #41b2ff);
      color: #ffffff;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(31, 143, 255, 0.28);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .primary-button {
      width: 100%;
    }

    .primary-button:hover,
    .add-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 15px 28px rgba(31, 143, 255, 0.34);
    }

    .primary-button.stop {
      background: linear-gradient(135deg, #0c72d0, #1f8fff);
    }

    .todo-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      align-items: start;
    }

    .todo-panel {
      padding-bottom: 6px;
    }

    .todo-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      width: 100%;
    }

    .clear-button {
      min-height: 38px;
      padding: 0 13px;
      border-radius: 999px;
      background: #eef7ff;
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px rgba(31, 143, 255, 0.14);
    }

    .todo-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 22px;
    }

    .todo-input {
      width: 100%;
      min-height: 48px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      color: var(--text);
      background: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .todo-input:focus {
      border-color: rgba(31, 143, 255, 0.72);
      box-shadow: 0 0 0 4px rgba(31, 143, 255, 0.12);
    }

    .add-button {
      padding: 0 18px;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 22px 18px;
    }

    .stat {
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--primary-soft);
    }

    .stat span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      color: var(--primary-dark);
      font-size: 24px;
      font-variant-numeric: tabular-nums;
    }

    .todo-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0 22px 22px;
      list-style: none;
    }

    .todo-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 62px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 18px rgba(72, 130, 174, 0.08);
      cursor: pointer;
    }

    .todo-checkbox {
      width: 28px;
      height: 28px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .todo-text {
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .todo-item.completed .todo-text {
      color: #91a0ae;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    .task-actions,
    .edit-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      cursor: default;
    }

    .edit-form {
      display: grid;
      grid-column: 2 / 4;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      cursor: default;
    }

    .edit-input {
      width: 100%;
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 13px;
      outline: none;
      color: var(--text);
      background: #ffffff;
    }

    .edit-input:focus {
      border-color: rgba(31, 143, 255, 0.72);
      box-shadow: 0 0 0 4px rgba(31, 143, 255, 0.12);
    }

    .edit-button,
    .save-button,
    .cancel-button,
    .delete-button {
      min-width: 42px;
      min-height: 38px;
      border-radius: 13px;
      font-weight: 900;
    }

    .edit-button,
    .save-button {
      background: #edf6ff;
      color: var(--primary-dark);
    }

    .cancel-button {
      background: #f1f5f9;
      color: var(--muted);
    }

    .delete-button {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .empty-state {
      margin: 4px 22px 24px;
      padding: 22px;
      border: 1px dashed #b9d9f3;
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(247, 251, 255, 0.76);
    }

    .logs-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      align-items: start;
      margin-top: 22px;
    }

    .log-list {
      display: grid;
      gap: 10px;
      max-height: 390px;
      margin: 0;
      padding: 22px;
      overflow: auto;
      list-style: none;
    }

    .log-item {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 18px rgba(72, 130, 174, 0.07);
    }

    .log-time {
      margin: 0 0 6px;
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .log-text {
      margin: 0;
      color: var(--text);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .tomato-dock {
      position: fixed;
      top: 46%;
      z-index: 20;
      transform: translateY(-50%);
    }

    .tomato-dock.left {
      left: 18px;
    }

    .tomato-dock.right {
      right: 18px;
    }

    .tomato-button {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      font-size: 32px;
      line-height: 1;
      transition: transform 160ms ease;
    }

    .tomato-dock:hover .tomato-button {
      transform: scale(1.05);
    }

    .tomato-popover {
      position: absolute;
      top: 50%;
      width: min(300px, calc(100vw - 86px));
      padding: 16px;
      border: 1px solid rgba(31, 143, 255, 0.16);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(247, 251, 255, 0.84));
      background-position: center;
      background-size: cover;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) scale(0.98);
      transition: opacity 160ms ease, transform 160ms ease;
      backdrop-filter: blur(14px);
    }

    .tomato-dock.left .tomato-popover {
      left: 66px;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(225, 247, 255, 0.78)),
        url("tomato-left-bg.jpg");
    }

    .tomato-dock.right .tomato-popover {
      right: 66px;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 237, 242, 0.8)),
        url("tomato-right-bg.jpg");
    }

    .tomato-dock:hover .tomato-popover,
    .tomato-dock:focus-within .tomato-popover {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) scale(1);
    }

    .tomato-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 900;
    }

    .tomato-status {
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 12px;
      white-space: nowrap;
    }

    .tomato-time {
      margin: 8px 0 10px;
      color: #e24752;
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .tomato-note {
      min-height: 42px;
      margin: 0 0 13px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      text-align: center;
    }

    .tomato-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tomato-settings {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 0 0 12px;
    }

    .tomato-field {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .tomato-input {
      width: 100%;
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background: #ffffff;
      font-weight: 800;
    }

    .tomato-input:focus {
      border-color: rgba(31, 143, 255, 0.72);
      box-shadow: 0 0 0 3px rgba(31, 143, 255, 0.12);
    }

    .tomato-action {
      min-height: 38px;
      border-radius: 13px;
      background: #edf6ff;
      color: var(--primary-dark);
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .hero,
      .checkin-list,
      .todo-board,
      .logs-board {
        grid-template-columns: 1fr;
      }

      .clock {
        min-width: 0;
      }

      .tomato-dock {
        top: auto;
        bottom: 16px;
        transform: none;
      }

      .tomato-dock.left {
        left: 12px;
      }

      .tomato-dock.right {
        right: 12px;
      }

      .tomato-dock.left .tomato-popover {
        top: auto;
        bottom: 66px;
        left: 0;
        transform: scale(0.98);
      }

      .tomato-dock.right .tomato-popover {
        top: auto;
        right: 0;
        bottom: 66px;
        transform: scale(0.98);
      }

      .tomato-dock:hover .tomato-popover,
      .tomato-dock:focus-within .tomato-popover {
        transform: scale(1);
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 20px, 1180px);
        padding: 24px 0 30px;
      }

      .panel-header,
      .checkin-list,
      .todo-form,
      .todo-list {
        padding-left: 14px;
        padding-right: 14px;
      }

      .stats {
        padding-left: 14px;
        padding-right: 14px;
      }

      .todo-form,
      .todo-title-row {
        grid-template-columns: 1fr;
      }

      .todo-form {
        display: grid;
      }

      .todo-title-row {
        display: grid;
      }

      .add-button,
      .clear-button {
        width: 100%;
      }

      .task-actions,
      .edit-actions {
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .edit-form {
        grid-template-columns: 1fr;
      }

      .checkin-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .time-row {
        flex-direction: column;
        gap: 5px;
      }

      .time-row strong {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="tomato-dock left" data-tomato-id="left">
    <button class="tomato-button" type="button" aria-label="打开番茄钟">🍅</button>
    <section class="tomato-popover" aria-label="番茄钟">
      <div class="tomato-title">
        <span>番茄钟</span>
        <span class="tomato-status" data-tomato-status>未开始</span>
      </div>
      <div class="tomato-time" data-tomato-time>60:00</div>
      <p class="tomato-note" data-tomato-note>默认工作 60 分钟，休息 10 分钟。开始后会优先按正在进行的打卡开始时间计算。</p>
      <div class="tomato-settings">
        <label class="tomato-field">
          工作分钟
          <input class="tomato-input" type="number" min="1" max="240" step="1" data-tomato-work value="60" />
        </label>
        <label class="tomato-field">
          休息分钟
          <input class="tomato-input" type="number" min="1" max="120" step="1" data-tomato-rest value="10" />
        </label>
      </div>
      <div class="tomato-actions">
        <button class="tomato-action" type="button" data-tomato-action="start">开始</button>
        <button class="tomato-action" type="button" data-tomato-action="pause">暂停</button>
        <button class="tomato-action" type="button" data-tomato-action="reset">重置</button>
      </div>
    </section>
  </div>
  <div class="tomato-dock right" data-tomato-id="right">
    <button class="tomato-button" type="button" aria-label="打开番茄钟">🍅</button>
    <section class="tomato-popover" aria-label="番茄钟">
      <div class="tomato-title">
        <span>番茄钟</span>
        <span class="tomato-status" data-tomato-status>未开始</span>
      </div>
      <div class="tomato-time" data-tomato-time>60:00</div>
      <p class="tomato-note" data-tomato-note>默认工作 60 分钟，休息 10 分钟。开始后会优先按正在进行的打卡开始时间计算。</p>
      <div class="tomato-settings">
        <label class="tomato-field">
          工作分钟
          <input class="tomato-input" type="number" min="1" max="240" step="1" data-tomato-work value="60" />
        </label>
        <label class="tomato-field">
          休息分钟
          <input class="tomato-input" type="number" min="1" max="120" step="1" data-tomato-rest value="10" />
        </label>
      </div>
      <div class="tomato-actions">
        <button class="tomato-action" type="button" data-tomato-action="start">开始</button>
        <button class="tomato-action" type="button" data-tomato-action="pause">暂停</button>
        <button class="tomato-action" type="button" data-tomato-action="reset">重置</button>
      </div>
    </section>
  </div>
  <main class="page">
    <section class="hero" aria-labelledby="app-title">
      <div>
        <p class="eyebrow">小八正在监督你！</p>
        <h1 id="app-title">十三 小根 你俩还不学习！！</h1>
        <p class="subtitle">记录十三和小根的学习打卡，管理各自的任务进度。数据保存在本机浏览器，刷新后仍会保留。</p>
      </div>
      <aside class="clock" aria-label="当前北京时间">
        <p class="clock-label">当前北京时间</p>
        <div class="clock-time" id="beijingClock">--</div>
      </aside>
    </section>

    <section class="panel" aria-labelledby="checkin-title">
      <div class="panel-header">
        <div>
          <h2 class="panel-title" id="checkin-title">学习打卡</h2>
          <p class="panel-note">点击卡片按钮开始计时，再次点击结束。</p>
        </div>
      </div>
      <div class="checkin-list" id="checkinList"></div>
    </section>

    <section class="todo-board" id="todoBoard" aria-label="待办清单"></section>
    <section class="logs-board" aria-label="使用日志和修改日志">
      <section class="panel log-panel" aria-labelledby="usage-log-title">
        <div class="panel-header">
          <div>
            <h2 class="panel-title" id="usage-log-title">使用日志</h2>
            <p class="panel-note">自动记录每次打卡和任务操作。</p>
          </div>
        </div>
        <ul class="log-list" id="usageLogList"></ul>
      </section>
      <section class="panel log-panel" aria-labelledby="change-log-title">
        <div class="panel-header">
          <div>
            <h2 class="panel-title" id="change-log-title">修改日志</h2>
            <p class="panel-note">记录网站功能的添加、减少和调整。</p>
          </div>
        </div>
        <ul class="log-list" id="changeLogList"></ul>

  <script>
    const STORAGE_KEY = "supervised-study-checkin-v1";
    const SUPABASE_URL = "https://xovukhqlqxaslwbtibva.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ljzuM1rtrLGQ_5XTW4CXUw_XLRXnZux";
    const SUPABASE_TABLE = "study_checkin_state";
    const SHARED_STATE_ID = "shared";
    const TOMATO_STORAGE_KEY = "study-checkin-tomato-v1";
    const TOMATO_IDS = ["left", "right"];
    const DEFAULT_TOMATO_WORK_MINUTES = 60;
    const DEFAULT_TOMATO_REST_MINUTES = 10;
    const BEIJING_TZ = "Asia/Shanghai";
    const CHECKINS = [
      { id: "shisan", name: "十三打卡", icon: "shisan-checkin-icon.jpg" },
      { id: "xiaogen", name: "小根打卡", icon: "xiaogen-checkin-icon.jpg" }

    const TODO_LISTS = [
      {
        id: "shisan",
        icon: "shisan-todo-icon.jpg",
        title: "十三待办清单",
        placeholder: "小十三今天要做什么？",

      {
        id: "xiaogen",
        icon: "xiaogen-todo-icon.jpg",
        title: "小根待办清单",
        placeholder: "小根今天要做什么？",
        empty: "小根还没有任务，先写下一个目标。"
      }
    ];
    const INITIAL_CHANGE_LOGS = [
      {
        id: "change-20260628-tomato",
        at: Date.now(),
        text: "添加左右番茄钟图标和悬浮小窗口：支持 60 分钟工作、10 分钟休息、开始、暂停、重置和浏览器通知提醒。"
      },
      {
        id: "change-20260628-tomato-independent",
        at: Date.now(),
        text: "番茄钟更新：左右两个番茄钟独立倒计时，并支持分别修改工作时间和休息时间。"
      },
      {
        id: "change-20260628-tomato-bg",
        at: Date.now(),
        text: "番茄钟外观更新：把两张图片依次设置为左右番茄小窗口背景图。"
      },
      {
        id: "change-20260628-logs",
        at: Date.now(),
        text: "添加使用日志和修改日志：使用日志自动记录打卡与任务操作，修改日志记录网站功能变更。"
      },
      {
        id: "change-20260628-click-input",
        at: Date.parse("2026-06-28T08:48:39Z"),
        text: "修复点击不灵敏：放大待办复选框，支持点击任务整行切换完成状态；移除任务输入长度限制。"

      {
        id: "change-20260626-shared",
        at: Date.parse("2026-06-26T06:45:28Z"),
        text: "接入 Supabase 云端共享数据，所有人访问同一个线上页面时读写同一份公开数据。"
      },
      {
        id: "change-20260626-edit",
        at: Date.parse("2026-06-26T05:24:02Z"),
        text: "添加任务编辑功能：已添加的任务可编辑、保存或取消。"
      },
      {
        id: "change-20260626-icons",
        at: Date.parse("2026-06-26T05:16:05Z"),
        text: "为打卡标题和待办标题添加图片图标。"
      },
      {
        id: "change-20260626-deploy",
        at: Date.parse("2026-06-26T05:55:32Z"),
        text: "发布 GitHub Pages 永久在线网页。"
      },
      {
        id: "change-20260626-initial",
        at: Date.parse("2026-06-26T04:40:24Z"),
        text: "创建监督学习打卡与待办事项网页：两个打卡框、两个待办清单、本地存储、响应式布局和背景图。"
      }
    ];

    const emptyCheckin = () => ({
      running: false,
      startAt: null,
      endAt: null,
      elapsedMs: 0
    });

    const defaultState = () => ({
      checkins: CHECKINS.reduce((items, item) => {
        items[item.id] = emptyCheckin();
        return items;
      }, {}),
      todos: TODO_LISTS.reduce((items, item) => {
        items[item.id] = [];
        return items;
      }, {}),
      usageLogs: [],
      changeLogs: INITIAL_CHANGE_LOGS
    });

    let state = loadCachedState();
    let editingTask = null;
    let remoteReady = false;
    let tomatoState = loadTomatoState();

    const elements = {
      beijingClock: document.getElementById("beijingClock"),
      checkinList: document.getElementById("checkinList"),
      todoBoard: document.getElementById("todoBoard"),
      usageLogList: document.getElementById("usageLogList"),
      changeLogList: document.getElementById("changeLogList"),
      tomatoDocks: [...document.querySelectorAll("[data-tomato-id]")]
    };

    function normalizeState(saved) {
      const fallback = defaultState();
      if (!saved || typeof saved !== "object") {
        return fallback;
      }

      const migratedTasks = Array.isArray(saved.tasks) ? saved.tasks : [];

      return {
        checkins: CHECKINS.reduce((items, item) => {
          items[item.id] = {
            ...emptyCheckin(),
            ...(saved.checkins && saved.checkins[item.id] ? saved.checkins[item.id] : {})
          };
          return items;
        }, {}),
        todos: TODO_LISTS.reduce((items, item, index) => {
          const existing = saved.todos && Array.isArray(saved.todos[item.id]) ? saved.todos[item.id] : null;
          items[item.id] = existing || (index === 0 ? migratedTasks : []);
          return items;
        }, {}),
        usageLogs: limitLogs(Array.isArray(saved.usageLogs) ? saved.usageLogs : []),
        changeLogs: mergeChangeLogs(saved.changeLogs)
      };
    }

    function limitLogs(logs) {
      return logs
        .filter((log) => log && log.text)
        .sort((a, b) => (b.at || 0) - (a.at || 0))
        .slice(0, 100);
    }

    function mergeChangeLogs(savedLogs) {
      const byId = new Map();
      INITIAL_CHANGE_LOGS.forEach((log) => byId.set(log.id, log));
      if (Array.isArray(savedLogs)) {
        savedLogs.forEach((log) => {
          if (log && log.id) {
            byId.set(log.id, log);
          }
        });
      }

      return limitLogs([...byId.values()]);
    }

    function loadCachedState() {
      try {
        return normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY)));
      } catch {
        return defaultState();
      }
    }

    function cacheState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function createTomatoTimer(overrides = {}) {
      return {
        running: false,
        startedAt: null,
        pausedRemainingMs: DEFAULT_TOMATO_WORK_MINUTES * 60 * 1000,
        pausedPhase: null,
        lastNotifiedCycle: -1,
        workMinutes: DEFAULT_TOMATO_WORK_MINUTES,
        restMinutes: DEFAULT_TOMATO_REST_MINUTES,
        ...overrides
      };
    }

    function normalizeTomatoState(saved) {
      const timers = {};
      const legacy = saved && typeof saved === "object" && typeof saved.running === "boolean" ? saved : null;
      TOMATO_IDS.forEach((id) => {
        const source = saved && saved[id] ? saved[id] : legacy;
        timers[id] = createTomatoTimer(source || {});
        timers[id].workMinutes = clampNumber(timers[id].workMinutes, 1, 240, DEFAULT_TOMATO_WORK_MINUTES);
        timers[id].restMinutes = clampNumber(timers[id].restMinutes, 1, 120, DEFAULT_TOMATO_REST_MINUTES);
        if (!timers[id].pausedRemainingMs) {
          timers[id].pausedRemainingMs = timers[id].workMinutes * 60 * 1000;
        }
      });
      return timers;
    }

    function loadTomatoState() {
      try {
        return normalizeTomatoState(JSON.parse(localStorage.getItem(TOMATO_STORAGE_KEY)));
      } catch {
        return normalizeTomatoState();
      }
    }

    function clampNumber(value, min, max, fallback) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return fallback;
      }

      return Math.min(max, Math.max(min, Math.round(numeric)));
    }

    function tomatoWorkMs(timer) {
      return timer.workMinutes * 60 * 1000;
    }

    function tomatoRestMs(timer) {
      return timer.restMinutes * 60 * 1000;
    }

    function tomatoCycleMs(timer) {
      return tomatoWorkMs(timer) + tomatoRestMs(timer);
    }

    function saveTomatoState() {
      localStorage.setItem(TOMATO_STORAGE_KEY, JSON.stringify(tomatoState));
    }

    function getTomato(id) {
      tomatoState[id] ||= createTomatoTimer();
      return tomatoState[id];
    }

    function tomatoLabel(id) {
      return id === "left" ? "左侧番茄钟" : "右侧番茄钟";
    }

    function updateTomatoDurations(id, workMinutes, restMinutes) {
      const timer = getTomato(id);
      const wasRunning = timer.running;
      const workFallback = timer.workMinutes || DEFAULT_TOMATO_WORK_MINUTES;
      const restFallback = timer.restMinutes || DEFAULT_TOMATO_REST_MINUTES;
      timer.workMinutes = clampNumber(workMinutes, 1, 240, workFallback);
      timer.restMinutes = clampNumber(restMinutes, 1, 120, restFallback);
      if (!wasRunning) {
        timer.pausedRemainingMs = timer.workMinutes * 60 * 1000;
        timer.pausedPhase = null;
      }
      saveTomatoState();
      renderTomato(id);
    }

    async function fetchSharedState() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=data&id=eq.${SHARED_STATE_ID}`, {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      });
      if (!response.ok) {
        throw new Error(`读取云端数据失败：${response.status}`);
      }

      const rows = await response.json();
      if (!rows.length) {
        return defaultState();
      }

      return normalizeState(rows[0].data);
    }

    async function saveSharedState() {
      cacheState();
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${SHARED_STATE_ID}`, {
          method: "PATCH",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json; charset=utf-8",
            Prefer: "return=minimal"
          },
          body: JSON.stringify({
            data: state
          })
        });
        if (!response.ok) {
          throw new Error(`保存云端数据失败：${response.status}`);
        }
        remoteReady = true;
      } catch (error) {
        remoteReady = false;
        console.warn(error);
      }
    }

    async function hydrateSharedState() {
      try {
        state = await fetchSharedState();
        remoteReady = true;
        cacheState();
        renderAll();
      } catch (error) {
        remoteReady = false;
        console.warn(error);
      }
    }

    function formatBeijingTime(timestamp) {
      if (!timestamp) {
        return "未记录";
      }

      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: BEIJING_TZ,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(new Date(timestamp));
    }

    function formatDuration(ms) {
      const safeMs = Math.max(0, Number(ms) || 0);
      const totalSeconds = Math.floor(safeMs / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return [hours, minutes, seconds]
        .map((part) => String(part).padStart(2, "0"))
        .join(":");
    }

    function formatCountdown(ms) {
      const safeMs = Math.max(0, Number(ms) || 0);
      const totalSeconds = Math.ceil(safeMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function currentElapsed(checkin) {
      if (checkin.running && checkin.startAt) {
        return Date.now() - checkin.startAt;
      }

      return checkin.elapsedMs;
    }

    function activeCheckinStartAt() {
      const running = CHECKINS
        .map((item) => state.checkins[item.id])
        .filter((checkin) => checkin && checkin.running && checkin.startAt)
        .sort((a, b) => a.startAt - b.startAt);

      return running[0]?.startAt || null;
    }

    function requestNotificationPermission() {
      if (!("Notification" in window) || Notification.permission !== "default") {
        return;
      }

      Notification.requestPermission().catch(() => {});
    }

    function sendTomatoNotification() {
      if (!("Notification" in window) || Notification.permission !== "granted") {
        return;
      }

      new Notification("番茄钟", {
        body: "该打瓦了，别他妈学了！"
      });
    }

    function tomatoSnapshot(id) {
      const timer = getTomato(id);
      const workMs = tomatoWorkMs(timer);
      const restMs = tomatoRestMs(timer);
      const cycleMs = tomatoCycleMs(timer);

      if (!timer.running || !timer.startedAt) {
        const pausedPhase = timer.pausedPhase === "rest" ? "rest" : "work";
        const phaseLimit = pausedPhase === "rest" ? restMs : workMs;
        const savedRemaining = Number(timer.pausedRemainingMs);
        const remainingMs = Number.isFinite(savedRemaining) && savedRemaining > 0
          ? Math.min(savedRemaining, phaseLimit)
          : phaseLimit;

        return {
          phase: pausedPhase,
          label: timer.pausedPhase ? "已暂停" : "未开始",
          remainingMs,
          cycle: timer.lastNotifiedCycle
        };
      }

      const elapsed = Math.max(0, Date.now() - timer.startedAt);
      const cycle = Math.floor(elapsed / cycleMs);
      const cycleElapsed = elapsed % cycleMs;
      if (cycleElapsed < workMs) {
        return {
          phase: "work",
          label: "工作中",
          remainingMs: workMs - cycleElapsed,
          cycle
        };
      }

      return {
        phase: "rest",
        label: "休息中",
        remainingMs: cycleMs - cycleElapsed,
        cycle
      };
    }

    function maybeNotifyTomato(id, snapshot) {
      const timer = getTomato(id);
      if (!timer.running || snapshot.phase !== "rest") {
        return;
      }

      if (snapshot.cycle !== timer.lastNotifiedCycle) {
        timer.lastNotifiedCycle = snapshot.cycle;
        saveTomatoState();
        sendTomatoNotification();
        addUsageLog(`${tomatoLabel(id)} 工作倒计时结束，已发送提醒。`);
        saveSharedState();
        renderLogs();
      }
    }

    function findTomatoDock(id) {
      return elements.tomatoDocks.find((dock) => dock.dataset.tomatoId === id);
    }

    function syncTomatoInput(input, value) {
      if (input && document.activeElement !== input) {
        input.value = String(value);
      }
    }

    function renderTomato(id) {
      const dock = findTomatoDock(id);
      if (!dock) {
        return;
      }

      const timer = getTomato(id);
      const snapshot = tomatoSnapshot(id);
      maybeNotifyTomato(id, snapshot);
      const note = timer.running
        ? `当前设置：工作 ${timer.workMinutes} 分钟，休息 ${timer.restMinutes} 分钟。${activeCheckinStartAt() ? "按当前正在进行的打卡开始时间计算。" : "按番茄钟开始时间计算。"}`
        : `当前设置：工作 ${timer.workMinutes} 分钟，休息 ${timer.restMinutes} 分钟。开始后会优先按正在进行的打卡开始时间计算。`;

      const time = dock.querySelector("[data-tomato-time]");
      const status = dock.querySelector("[data-tomato-status]");
      const noteText = dock.querySelector("[data-tomato-note]");
      const workInput = dock.querySelector("[data-tomato-work]");
      const restInput = dock.querySelector("[data-tomato-rest]");
      const startButton = dock.querySelector('[data-tomato-action="start"]');
      const pauseButton = dock.querySelector('[data-tomato-action="pause"]');

      if (time) {
        time.textContent = formatCountdown(snapshot.remainingMs);
      }
      if (status) {
        status.textContent = snapshot.label;
      }
      if (noteText) {
        noteText.textContent = note;
      }
      syncTomatoInput(workInput, timer.workMinutes);
      syncTomatoInput(restInput, timer.restMinutes);
      if (startButton) {
        startButton.disabled = timer.running;
      }
      if (pauseButton) {
        pauseButton.disabled = !timer.running;
      }
    }

    function renderTomatoes() {
      TOMATO_IDS.forEach((id) => renderTomato(id));
    }

    function startTomato(id) {
      const timer = getTomato(id);
      if (timer.running) {
        return;
      }

      const now = Date.now();
      const workMs = tomatoWorkMs(timer);
      const restMs = tomatoRestMs(timer);
      const snapshot = tomatoSnapshot(id);
      const checkinStartAt = activeCheckinStartAt();
      const pausedOffset = snapshot.phase === "rest"
        ? workMs + (restMs - snapshot.remainingMs)
        : workMs - snapshot.remainingMs;

      timer.running = true;
      timer.startedAt = timer.pausedPhase
        ? now - Math.max(0, pausedOffset)
        : checkinStartAt || (now - Math.max(0, pausedOffset));
      timer.pausedRemainingMs = null;
      timer.pausedPhase = null;
      timer.lastNotifiedCycle = -1;
      saveTomatoState();
      addUsageLog(`${tomatoLabel(id)} 开始。`);
      saveSharedState();
      renderLogs();
      renderTomato(id);
    }

    function pauseTomato(id) {
      const timer = getTomato(id);
      if (!timer.running) {
        return;
      }

      const snapshot = tomatoSnapshot(id);
      timer.running = false;
      timer.startedAt = null;
      timer.pausedRemainingMs = snapshot.remainingMs;
      timer.pausedPhase = snapshot.phase;
      saveTomatoState();
      addUsageLog(`${tomatoLabel(id)} 暂停，剩余 ${formatCountdown(snapshot.remainingMs)}。`);
      saveSharedState();
      renderLogs();
      renderTomato(id);
    }

    function resetTomato(id) {
      const timer = getTomato(id);
      const workMinutes = timer.workMinutes;
      const restMinutes = timer.restMinutes;
      tomatoState[id] = createTomatoTimer({
        workMinutes,
        restMinutes,
        pausedRemainingMs: workMinutes * 60 * 1000
      });
      saveTomatoState();
      addUsageLog(`${tomatoLabel(id)} 重置。`);
      saveSharedState();
      renderLogs();
      renderTomato(id);
    }

    function renderClock() {
      elements.beijingClock.textContent = formatBeijingTime(Date.now());
    }

    function renderCheckins() {
      elements.checkinList.innerHTML = CHECKINS.map((item) => {
        const checkin = state.checkins[item.id];
        const elapsed = formatDuration(currentElapsed(checkin));
        const statusText = checkin.running ? "进行中" : checkin.endAt ? "已结束" : "未开始";
        const buttonText = checkin.running ? "结束打卡" : "开始打卡";

        return `
          <article class="checkin-card" data-checkin-card="${item.id}">
            <div class="checkin-head">
              <h3 class="checkin-name title-with-icon">
                <img class="title-icon" src="${item.icon}" alt="" />
                <span>${item.name}</span>
              </h3>
              <span class="status ${checkin.running ? "running" : ""}">${statusText}</span>
            </div>
            <p class="timer">${elapsed}</p>
            <div class="time-grid">
              <div class="time-row">
                <span>打卡时间</span>
                <strong>${formatBeijingTime(checkin.startAt)}</strong>
              </div>
              <div class="time-row">
                <span>结束时间</span>
                <strong>${formatBeijingTime(checkin.endAt)}</strong>
              </div>
            </div>
            <button class="primary-button ${checkin.running ? "stop" : ""}" type="button" data-checkin="${item.id}">
              ${buttonText}
            </button>
          </article>
        `;
      }).join("");
    }

    function renderTodos() {
      elements.todoBoard.innerHTML = TODO_LISTS.map((list) => {
        const tasks = state.todos[list.id] || [];
        const done = tasks.filter((task) => task.completed).length;
        const active = tasks.length - done;

        return `
          <section class="panel todo-panel" aria-labelledby="${list.id}-todo-title">
            <div class="panel-header">
              <div class="todo-title-row">
                <div>
                  <h2 class="panel-title title-with-icon" id="${list.id}-todo-title">
                    <img class="title-icon" src="${list.icon}" alt="" />
                    <span>${list.title}</span>
                  </h2>
                  <p class="panel-note">添加任务，勾选完成，随时删除。</p>
                </div>
                <button class="clear-button" type="button" data-clear-completed="${list.id}" ${done === 0 ? "disabled" : ""}>
                  清空已完成
                </button>
              </div>
            </div>
            <form class="todo-form" data-todo-form="${list.id}">
              <input class="todo-input" type="text" placeholder="${list.placeholder}" autocomplete="off" />
              <button class="add-button" type="submit">➕ 添加任务</button>
            </form>
            <div class="stats" aria-label="${list.title}统计">
              <div class="stat">
                <span>未完成</span>
                <strong>${active}</strong>
              </div>
              <div class="stat">
                <span>已完成</span>
                <strong>${done}</strong>
              </div>
            </div>
            <ul class="todo-list">
              ${tasks.map((task) => {
                const isEditing = editingTask && editingTask.listId === list.id && editingTask.taskId === task.id;
                return `
                <li class="todo-item ${task.completed ? "completed" : ""}" data-list-id="${list.id}" data-task-id="${task.id}">
                  <input class="todo-checkbox" type="checkbox" ${task.completed ? "checked" : ""} ${isEditing ? "disabled" : ""} aria-label="标记任务完成" />
                  ${isEditing ? `
                    <form class="edit-form" data-edit-form="${list.id}" data-task-id="${task.id}">
                      <input class="edit-input" type="text" value="${escapeHtml(task.text)}" aria-label="编辑任务内容" />
                      <div class="edit-actions">
                        <button class="save-button" type="submit">保存</button>
                        <button class="cancel-button" type="button" data-cancel-edit>取消</button>
                      </div>
                    </form>
                  ` : `
                    <span class="todo-text">${escapeHtml(task.text)}</span>
                    <div class="task-actions">
                      <button class="edit-button" type="button" data-edit-task aria-label="编辑任务">编辑</button>
                      <button class="delete-button" type="button" aria-label="删除任务">删</button>
                    </div>
                  `}
                </li>
              `}).join("")}
            </ul>
            <div class="empty-state" ${tasks.length > 0 ? "hidden" : ""}>${list.empty}</div>
          </section>
        `;
      }).join("");
    }

    function renderLogList(element, logs, emptyText) {
      const items = limitLogs(logs);
      element.innerHTML = items.length ? items.map((log) => `
        <li class="log-item">
          <p class="log-time">${formatBeijingTime(log.at)}</p>
          <p class="log-text">${escapeHtml(log.text)}</p>
        </li>
      `).join("") : `
        <li class="log-item">
          <p class="log-text">${emptyText}</p>
        </li>
      `;
    }

    function renderLogs() {
      renderLogList(elements.usageLogList, state.usageLogs || [], "还没有使用记录。");
      renderLogList(elements.changeLogList, state.changeLogs || [], "还没有修改记录。");
    }

    function renderAll() {
      renderClock();
      renderCheckins();
      renderTodos();
      renderLogs();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function listName(listId) {
      return TODO_LISTS.find((list) => list.id === listId)?.title || listId;
    }

    function checkinName(checkinId) {
      return CHECKINS.find((item) => item.id === checkinId)?.name || checkinId;
    }

    function addUsageLog(text) {
      state.usageLogs = limitLogs([
        {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          at: Date.now(),
          text
        },
        ...(state.usageLogs || [])
      ]);
    }

    function toggleCheckin(id) {
      const checkin = state.checkins[id];
      const now = Date.now();

      if (checkin.running) {
        checkin.running = false;
        checkin.endAt = now;
        checkin.elapsedMs = now - checkin.startAt;
        addUsageLog(`${checkinName(id)} 结束打卡，用时 ${formatDuration(checkin.elapsedMs)}。`);
      } else {
        checkin.running = true;
        checkin.startAt = now;
        checkin.endAt = null;
        checkin.elapsedMs = 0;
        addUsageLog(`${checkinName(id)} 开始打卡。`);
      }

      saveSharedState();
      renderAll();
    }

    function addTask(listId, text) {
      state.todos[listId].unshift({
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        text,
        completed: false,
        createdAt: Date.now()
      });
      addUsageLog(`${listName(listId)} 添加任务：“${text}”。`);
      saveSharedState();
      renderAll();
    }

    function toggleTask(listId, id) {
      const task = state.todos[listId].find((item) => item.id === id);
      const nextCompleted = task ? !task.completed : false;
      state.todos[listId] = state.todos[listId].map((task) => (
        task.id === id ? { ...task, completed: !task.completed } : task
      ));
      if (task) {
        addUsageLog(`${listName(listId)} ${nextCompleted ? "完成" : "取消完成"}任务：“${task.text}”。`);
      }
      saveSharedState();
      renderAll();
    }

    function startEditTask(listId, id) {
      editingTask = { listId, taskId: id };
      renderTodos();
      const input = elements.todoBoard.querySelector(".edit-input");
      if (input) {
        input.focus();
        input.select();
      }
    }

    function cancelEditTask() {
      editingTask = null;
      renderTodos();
    }

    function saveEditedTask(listId, id, text) {
      const value = text.trim();
      if (!value) {
        return false;
      }

      const oldTask = state.todos[listId].find((task) => task.id === id);
      state.todos[listId] = state.todos[listId].map((task) => (
        task.id === id ? { ...task, text: value } : task
      ));
      editingTask = null;
      if (oldTask) {
        addUsageLog(`${listName(listId)} 编辑任务：“${oldTask.text}” 改为 “${value}”。`);
      }
      saveSharedState();
      renderAll();
      return true;
    }

    function deleteTask(listId, id) {
      const task = state.todos[listId].find((item) => item.id === id);
      state.todos[listId] = state.todos[listId].filter((task) => task.id !== id);
      if (task) {
        addUsageLog(`${listName(listId)} 删除任务：“${task.text}”。`);
      }
      saveSharedState();
      renderAll();
    }

    function clearCompleted(listId) {
      const completedCount = state.todos[listId].filter((task) => task.completed).length;
      state.todos[listId] = state.todos[listId].filter((task) => !task.completed);
      addUsageLog(`${listName(listId)} 清空已完成任务 ${completedCount} 个。`);
      saveSharedState();
      renderAll();
    }

    elements.checkinList.addEventListener("click", (event) => {
      const target = event.target.closest("[data-checkin], [data-checkin-card]");
      if (!target) {
        return;
      }

      toggleCheckin(target.dataset.checkin || target.dataset.checkinCard);
    });

    elements.todoBoard.addEventListener("submit", (event) => {
      const editForm = event.target.closest("[data-edit-form]");
      if (editForm) {
        event.preventDefault();
        const input = editForm.querySelector(".edit-input");
        const saved = saveEditedTask(editForm.dataset.editForm, editForm.dataset.taskId, input.value);
        if (!saved) {
          input.focus();
        }
        return;
      }

      const form = event.target.closest("[data-todo-form]");
      if (!form) {
        return;
      }

      event.preventDefault();
      const input = form.querySelector(".todo-input");
      const value = input.value.trim();
      if (!value) {
        input.focus();
        return;
      }

      addTask(form.dataset.todoForm, value);
    });

    elements.todoBoard.addEventListener("click", (event) => {
      const clearButton = event.target.closest("[data-clear-completed]");
      if (clearButton) {
        clearCompleted(clearButton.dataset.clearCompleted);
        return;
      }

      const item = event.target.closest("[data-task-id]");
      if (!item) {
        return;
      }

      if (event.target.closest("[data-edit-task]")) {
        startEditTask(item.dataset.listId, item.dataset.taskId);
        return;
      }

      if (event.target.closest("[data-cancel-edit]")) {
        cancelEditTask();
        return;
      }

      if (event.target.matches(".delete-button")) {
        deleteTask(item.dataset.listId, item.dataset.taskId);
        return;
      }

      if (event.target.matches(".todo-checkbox")) {
        toggleTask(item.dataset.listId, item.dataset.taskId);
        return;
      }

      if (!event.target.closest(".task-actions, .edit-form, button, input")) {
        toggleTask(item.dataset.listId, item.dataset.taskId);
      }
    });

    elements.tomatoDocks.forEach((dock) => {
      const tomatoId = dock.dataset.tomatoId;

      dock.addEventListener("click", (event) => {
        const button = event.target.closest("[data-tomato-action]");
        if (!button) {
          return;
        }

        if (button.dataset.tomatoAction === "start") {
          requestNotificationPermission();
          startTomato(tomatoId);
        }

        if (button.dataset.tomatoAction === "pause") {
          pauseTomato(tomatoId);
        }

        if (button.dataset.tomatoAction === "reset") {
          resetTomato(tomatoId);
        }
      });

      dock.addEventListener("change", (event) => {
        if (!event.target.matches("[data-tomato-work], [data-tomato-rest]")) {
          return;
        }

        const workInput = dock.querySelector("[data-tomato-work]");
        const restInput = dock.querySelector("[data-tomato-rest]");
        updateTomatoDurations(tomatoId, workInput.value, restInput.value);
      });
    });

    requestNotificationPermission();
    renderAll();
    renderTomatoes();
    hydrateSharedState();
    setInterval(() => {
      renderClock();
      renderCheckins();
      renderTomatoes();
    }, 1000);
    setInterval(async () => {
      if (editingTask) {
        return;
      }

      try {
        state = await fetchSharedState();
        cacheState();
        renderAll();
      } catch (error) {
        remoteReady = false;
        console.warn(error);
      }
    }, 15000);
  </script>
</body>
</html>
